<template>
    <div class="slds-p-horizontal_medium slds-p-vertical_small">
        <template if:true={showSuccessMessage}>
            <div class="slds-align_absolute-center slds-p-around_large">
                <div class="slds-box slds-text-align_center">
                    <lightning-icon icon-name="utility:success" size="large"></lightning-icon>
                    <h2 class="slds-text-heading_medium slds-m-top_medium">
                        Records successfully inserted. Please proceed with next screen.
                    </h2>
                </div>
            </div>
        </template>

        <template if:false={showSuccessMessage}>
            <!-- Header Row -->
            <div class="slds-grid slds-gutters slds-border_bottom slds-p-bottom_x-small slds-m-bottom_small">
                <div class="slds-col slds-size_2-of-12">
                    <strong>Resource</strong>
                </div>
                <div class="slds-col slds-size_3-of-12">
                    <strong>Description</strong>
                </div>
                <div class="slds-col slds-size_2-of-12">
                    <strong>Unit of Measure</strong>
                </div>
                <div class="slds-col slds-size_2-of-12">
                    <strong>Rate</strong>
                </div>

                <div class="slds-col slds-size_1-of-12">
                    <strong>Action</strong>
                </div>
            </div>

            <!-- Dynamic Rows -->
            <template for:each={skuRows} for:item="row">
                <div key={row.id} class="slds-grid slds-gutters slds-p-vertical_x-small row-container">
                    <!-- Resource Column -->
                    <div class="slds-col slds-size_2-of-12">
                        <c-employee-custom-lookup placeholder="Search Resource Name..." work-order-id={workOrderId}
                            s-object-api-name="Contact" data-row-id={row.id}
                            onlookupupdate={handleResourceLookupUpdate}>
                        </c-employee-custom-lookup>
                    </div>

                    <!-- Description Column -->
                    <div class="slds-col slds-size_3-of-12">
                        <c-item-master-custom-lookup placeholder="Search Service Name..." work-order-id={workOrderId}
                            unit-of-measure={unitOfMeasure} s-object-api-name="Item_Master__c" data-row-id={row.id}
                            onlookupupdate={handleLookupUpdate}>
                        </c-item-master-custom-lookup>
                    </div>

                    <!-- Unit of Measure Column -->
                    <div class="slds-col slds-size_2-of-12">
                        <lightning-combobox value={row.uOM} placeholder="Select UOM.." options={kPOPicklistOptions}
                            onchange={handleUOMChange} data-row-id={row.id} variant="label-hidden">
                        </lightning-combobox>
                    </div>

                    <!-- Rate Column -->
                    <div class="slds-col slds-size_2-of-12">
                        <lightning-input type="number" value={row.rate} step="0.00001" min="0" formatter="currency"
                            data-row-id={row.id} onchange={handleRateChange} variant="label-hidden">
                        </lightning-input>
                    </div>

                    <!-- Action Column -->
                    <div class="slds-col slds-size_1-of-12">
                        <lightning-button-icon icon-name="utility:delete" variant="border-filled"
                            alternative-text="Remove Row" title="Remove Row" data-row-id={row.id}
                            onclick={handleRemoveRow} class="remove-button">
                        </lightning-button-icon>
                    </div>
                </div>
            </template>

            <!-- Add Row Button -->
            <div class="slds-m-top_medium slds-m-bottom_medium">
                <lightning-button label="Add Row" icon-name="utility:add" variant="brand" onclick={handleAddRow}>
                </lightning-button>
            </div>

            <!-- Action Buttons -->
            <div class="slds-m-top_medium slds-m-bottom_medium slds-float_right">
                <lightning-button label="Back" variant="neutral" icon-name="utility:back" onclick={handleBackToParent}>
                </lightning-button>
                <template if:true={isAura}>
                    <lightning-button label="Cancel" onclick={handleCancel} class="slds-m-left_x-small">
                    </lightning-button>
                </template>
                <lightning-button label="Save" variant="brand" onclick={handleSave} class="slds-m-left_x-small">
                </lightning-button>
            </div>
            <br/>
            <br/>
        </template>
    </div>
</template>
