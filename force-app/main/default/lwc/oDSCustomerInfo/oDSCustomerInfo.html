<template>
    <div class="clr"></div>
    <div class="clr"></div>
    <div class="mid-bg" style="background: #FFFFFF;width: 100%;padding: 30px 2% 15px 2%;float: left;">
        <div class="spinnerDiv" style="display: none;">
            <div class="popupBackground"></div>
            <div class="PopupPanel">
                <table border="0" width="100%">
                    <tbody>
                        <tr>
                            <td style="text-align: center;font-size: 13px;"><b>Please Wait</b></td>
                        </tr>
                        <tr>
                            <td style="text-align: center;"><img src={spinner} /></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- modal start -->
        <template if:true={isShowModal}>
            
            <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
                aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                <div class="spinnerDiv1" style="display: none;">
                    <div class="popupBackground"></div>
                    <div class="PopupPanel">
                        <table border="0" width="100%">
                            <tbody>
                                <tr>
                                    <td style="text-align: center;font-size: 13px;"><b>Please Wait</b></td>
                                </tr>
                                <tr>
                                    <td style="text-align: center;"><img src={spinner} /></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="slds-modal__container">
                    <!-- modal header start -->
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close" onclick={hideModalBox}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse"
                                size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h1 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate" style="font-size: 16px !important;"><b>Kickoff
                                Completion</b>
                        </h1>
                    </header>
                    
                    <!-- modal body start -->
                    <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
                        <div class="slds-grid slds-gutters">
                            <div class="slds-col slds-size_12-of-12">
                                <div class="slds-grid slds-gutters slds-m-bottom_small">
                                    <div class="slds-col slds-size_6-of-12 slds-text-align_right">
                                        <label class="form-label">Kickoff Completed Date</label>
                                    </div>
                                    <div class="col-md-8 col-sm-8 col-xs-12">
                                        <lightning-input type="date"
                                            class="kickOffCompletedDatePopUp"></lightning-input>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- modal footer start-->
                    <footer class="slds-modal__footer">
                        <button class="slds-m-top_small cancelButton" onclick={hideModalBox}> CANCEL
                        </button>&nbsp;
                        <button class="slds-m-top_small approvedButton" onclick={handleKickoffCompleted}> Submit
                        </button>
                    </footer>

                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
        <!-- modal end -->

        <div class="sub-warp" style="max-width: 1300px;margin: 0 auto;">
