<template>
    <div class="mid-bg" style="width: 100%;padding: 0px 2% 15px 2%;float: left;" onchange={unSavedChanges}>
        <div class="spinnerDiv" style="display: None;">
            <div class="popupBackground" style="height: 450% !important;"></div>
            <div class="PopupPanel">
                <table border="0" width="100%">
                    <tbody>
                        <tr>
                            <td style="text-align: center;font-size: 12px;"><b>Please Wait</b></td>
                        </tr>
                        <tr>
                            <td style="text-align: center;"><img src={spinner} /></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- modal start -->
        <template if:true={isShowModalForApprovalUser}>
            <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
                aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container" style="max-width: 43% !important;">
                    <!-- modal header start -->
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close" onclick={hideModalBoxForApproval}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse"
                                size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 style="text-align:center;font-size:16px;font-weight: bold;text-transform: uppercase"
                            class="slds-text-heading_medium slds-hyphenat">Select the available user for
                            the approval</h2>
                    </header>
                    <!-- modal body start -->
                    <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1"
                        style="height: 170px;">
                        <br />
                        <div class="slds-grid slds-gutters">
                            <div class="slds-col slds-size_7-of-12">
                                <div class="slds-grid slds-gutters slds-m-bottom_small">
                                    <div class="slds-col slds-size_6-of-12 slds-text-align_right">
                                        <label class="form-label">Approver List</label>
                                    </div>
                                    <div class="slds-col slds-size_8-of-12">
                                        <lightning-combobox class="dropDownCSS" value={approverUserValue}
                                            name="ApproverList" onchange={handleApproversPopUp}
                                            options={approverUserList}>
                                        </lightning-combobox>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <br />
                        <br />
                        <div class="buttonSection" style="float: right;">
                            <lightning-button variant="brand" label="Cancel" onclick={hideModalBoxForApproval}>
                            </lightning-button>&nbsp;&nbsp;
                            <lightning-button variant="brand" label="Approve" onclick={ApproveTheEstimation}
                                class="searchButton" disabled={approverButtonOnPopUp}></lightning-button>
                        </div>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
        <!-- modal end -->

        <div class="sub-warp" style="max-width: 90%;margin:0;">
            <div class="mid-white">
                <lightning-messages data-id='formerror'> </lightning-messages>
                <template if:false={estimationSummary}>
                    <lightning-record-edit-form object-api-name="Estimation_Summary__c" onsuccess={handleSaveSuccess}
                        onsubmit={handleSaveSubmit} layout-type="Full" onerror={handleErrorMessage}>
                        <details open>
                            <summary>
                                <div class="panel-heading" style="color: #FFFFFF;background-color: #4ECAF4;"
                                    onclick={handleForDetailsElement}>
                                    <h3 style=" display:inline; " class="panel-title">Estimation Summary</h3>


                                    <div class="summary-chevron-up detailsClose clickable"
                                        style="float: right; display:none">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round"
                                            class="feather feather-chevron-down">
                                            <polyline points="6 9 12 15 18 9"></polyline>
                                        </svg>
                                    </div>
                                    <div class="summary-chevron-down detailsOpen clickable" style="float: right;">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round"
                                            class="feather feather-chevron-up">
                                            <polyline points="18 15 12 9 6 15"></polyline>
                                        </svg>
                                    </div>
                                </div>
                            </summary>
                            <div class="panel panel-default">

                                <div class="panel-body">

                                    <div class="slds-grid slds-gutters slds-wrap slds-wrap">
                                        <div
                                            class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                            <div class="slds-grid slds-gutters slds-wrap slds-wrap slds-m-bottom_small">
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-text-align_right">
                                                    <label class="form-label">Customer</label>
                                                </div>
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                                    <lightning-combobox
                                                        class="validatedField dropDownCSS lightningFields"
                                                        value={customerId} onchange={handleCustomerName}
                                                        options={customerNameList} disabled={disabledTheFIelds}
                                                        required="true"></lightning-combobox>
                                                    <lightning-input-field field-name='Customer__c' value={customerId}
                                                        variant="label-hidden" name="customer" style="display: none;">
                                                    </lightning-input-field>
                                                </div>
                                            </div>
                                            <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_small">
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-text-align_right">
                                                    <label class="form-label">Initiative Name
                                                    </label>
                                                </div>
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                                    <lightning-combobox
                                                        class="validatedField dropDownCSS lightningFields"
                                                        value={initiativesId} onchange={handleInitiatives}
                                                        options={initiativesList} disabled={disabledTheFIelds}
                                                        required="true"></lightning-combobox>
                                                    <lightning-input-field field-name='Project_ID__c'
                                                        variant="label-hidden" style="display: none;"
                                                        value={initiativesId}>
                                                    </lightning-input-field>
                                                </div>
                                            </div>
                                            <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_small">
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-text-align_right">
                                                    <label class="form-label">Jira ID
                                                    </label>
                                                </div>
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                                    <lightning-combobox
                                                        class="validatedField dropDownCSS lightningFields"
                                                        value={initiativesId} onchange={handleInitiatives}
                                                        options={JiraOptionList} disabled={disabledTheFIelds}
                                                        required="true"></lightning-combobox>

                                                </div>
                                            </div>
                                            <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_small">
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-text-align_right">
                                                    <label class="form-label">Revenue Region</label>
                                                </div>
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                                    <lightning-input-field
                                                        class="validatedField dropDownCSS lightningFields"
                                                        field-name='Revenue_Region__c' variant="label-hidden">
                                                    </lightning-input-field>
                                                </div>
                                            </div>
                                            <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_small">
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-text-align_right">
                                                    <label class="form-label">Project Billing Type</label>
                                                </div>
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                                    <lightning-input-field
                                                        class="validatedField dropDownCSS lightningFields"
                                                        field-name='Project_Billing_Type__c' variant="label-hidden">
                                                    </lightning-input-field>
                                                </div>
                                            </div>
                                            <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_small">
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-text-align_right">
                                                    <label class="form-label">Proposed Start Date</label>
                                                </div>
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                                    <lightning-input-field class="validate DateClass lightningFields"
                                                        field-name='Proposed_Start_Date__c' variant="label-hidden"
                                                        name="stDate">
                                                    </lightning-input-field>
                                                </div>
                                            </div>
                                            <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_small">
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-text-align_right">
                                                    <label class="form-label">Proposed End Date
                                                    </label>
                                                </div>
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                                    <lightning-input-field class="validate DateClass lightningFields"
                                                        field-name='Proposed_End_Date__c' variant="label-hidden"
                                                        name="eDate">
                                                    </lightning-input-field>
                                                </div>
                                            </div>
                                            <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_small">
                                                <div
                                                    class="slds-colslds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-text-align_right">
                                                    <label class="form-label">Created By</label>
                                                </div>
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                                    <div class="redColorBox">
                                                        <c-hierarchy-custom-lookup-lwc
                                                            s-object-api-name="Hierarchy_Lookup__c"
                                                            onlookupupdate={lookupCreateByRecord}
                                                            type-lookup="createBy">
                                                        </c-hierarchy-custom-lookup-lwc>
                                                    </div>
                                                    <div class="slds-form-element__help createdByFieldNew"
                                                        aria-live="assertive"
                                                        style="display: none;color: var(--lwc-colorTextError,rgb(234, 0, 30));">
                                                        Complete this field.</div>
                                                    <lightning-input-field field-name='Created_By__c'
                                                        class="validatedField createdByCSS lightningFields"
                                                        variant="label-hidden" disabled={disabledTheFIelds}
                                                        required="true" style="display: none;" value={createByValue}>
                                                    </lightning-input-field>
                                                </div>
                                            </div>
                                            <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_small">
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-text-align_right">
                                                    <label class="form-label">Created Date
                                                    </label>
                                                </div>
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                                    <lightning-formatted-date-time value={createdDate}>
                                                    </lightning-formatted-date-time>
                                                </div>
                                            </div>
                                            <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_small">
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-text-align_right">
                                                    <label class="form-label">Estimation Date
                                                    </label>
                                                </div>
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                                    <lightning-input-field class="DateClass lightningFields"
                                                        field-name='Estimation_Date__c' variant="label-hidden">
                                                    </lightning-input-field>
                                                </div>
                                            </div>
                                        </div>

                                        <div
                                            class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                            <div class="slds-grid slds-gutters slds-wrap slds-wrap slds-m-bottom_small">
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-text-align_right">
                                                    <label class="form-label">Work Hours Per Day
                                                    </label>
                                                </div>
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                                    <lightning-slider min="1" max="8" size="medium" value={perDayHours}
                                                        onchange={onChangeWorkHoursPerDay} class="lightningFields">
                                                    </lightning-slider>
                                                    <lightning-input-field class="hourDay"
                                                        field-name='Work_Hours_Per_Day__c' variant="label-hidden"
                                                        value={perDayHours} style="display: none;">
                                                    </lightning-input-field>
                                                </div>
                                            </div>
                                            <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_small">
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-text-align_right">
                                                    <label class="form-label">Work Days Per Week </label>
                                                </div>
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                                    <lightning-slider min="1" max="5" size="medium" value={perWeek}
                                                        onchange={onChangeWorkPerWeek} class="lightningFields">
                                                    </lightning-slider>

                                                    <lightning-input-field class="hourWeek" value={perWeek}
                                                        style="display: none;" field-name='Work_Days_Per_Week__c'
                                                        variant="label-hidden">
                                                    </lightning-input-field>
                                                </div>
                                            </div>
                                            <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_small">
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-text-align_right">
                                                    <label class="form-label">Work Days Per Month</label>
                                                </div>
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                                    <lightning-slider min="1" max="21" size="large" value={perMonth}
                                                        onchange={onChangeWorkPerMonth} class="lightningFields">
                                                    </lightning-slider>
                                                    <lightning-input-field class="hourMonth"
                                                        field-name='Work_Days_Per_Month__c' variant="label-hidden"
                                                        style="display: none;" value={perMonth}>
                                                    </lightning-input-field>
                                                </div>
                                            </div>
                                            <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_small">
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-text-align_right">
                                                    <label class="form-label">Is Coding Involved
                                                    </label>
                                                </div>
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                                    <lightning-input-field field-name='Is_Coding_Involved__c'
                                                        class="checkBoxCss lightningFields CodingInvoled"
                                                        variant="label-hidden" disabled="true">
                                                    </lightning-input-field>
                                                </div>
                                            </div>
                                            <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_small">
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-text-align_right">
                                                    <label class="form-label">Has Data Migration
                                                    </label>
                                                </div>
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                                    <lightning-input-field field-name='Has_Data_Migration__c'
                                                        class="checkBoxCss lightningFields" variant="label-hidden">
                                                    </lightning-input-field>
                                                </div>
                                            </div>
                                            <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_small">
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-text-align_right">
                                                    <label class="form-label">Status</label>
                                                </div>
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                                    <lightning-combobox class="dropDownCSS lightningFields"
                                                        value={statusValue} onchange={handleStatusDropDown}
                                                        options={statusOption}>
                                                    </lightning-combobox>

                                                    <lightning-input-field field-name='Status__c'
                                                        class="validatedField dropDownCSS lightningFields"
                                                        variant="label-hidden" style="display: none;"
                                                        value={statusValue}></lightning-input-field>

                                                </div>
                                            </div>
                                            <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_small">
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-text-align_right">
                                                    <label class="form-label">Customer Success Manager</label>
                                                </div>
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                                    <lightning-combobox class="dropDownCSS lightningFields"
                                                        value={CSMRecordID} onchange={handleCSM}
                                                        options={CSMOptionsList} style="display: block;"
                                                        disabled="true">
                                                    </lightning-combobox>
                                                    <lightning-input-field class="dropDownCSS"
                                                        field-name='Customer_Success_Manager__c' variant="label-hidden"
                                                        style="display: none;" value={CSMRecordID}>
                                                    </lightning-input-field>
                                                </div>
                                            </div>
                                            <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_small">
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-text-align_right">
                                                    <label class="form-label">Technical Project Manager
                                                    </label>
                                                </div>
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                                    <c-hierarchy-custom-lookup-lwc
                                                        s-object-api-name="Hierarchy_Lookup__c"
                                                        onlookupupdate={lookupTPMRecord} type-lookup="TPM/SME"
                                                        default-record-id={tpmName} class="lightningFields tpmLookUp">
                                                    </c-hierarchy-custom-lookup-lwc>
                                                    <template if:true={tpmName}>
                                                        <lightning-input-field field-name='Technical_Project_Manager__c'
                                                            class="dropDownCSS lightningFields" variant="label-hidden"
                                                            value={tpmName} style="display: none;">
                                                        </lightning-input-field>
                                                    </template>
                                                </div>
                                            </div>
                                            <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_small">
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-text-align_right">
                                                    <label class="form-label"> SME Vertical
                                                    </label>
                                                </div>
                                                <div
                                                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                                    <c-hierarchy-custom-lookup-lwc
                                                        s-object-api-name="Hierarchy_Lookup__c"
                                                        onlookupupdate={lookupSEMRecord} type-lookup="TPM/SME"
                                                        class="lightningFields">
                                                    </c-hierarchy-custom-lookup-lwc>

                                                    <template if:true={SEMVerticalValue}>
                                                        <lightning-input-field field-name='SME_Vertical__c'
                                                            value={SEMVerticalValue} variant="label-hidden"
                                                            style="display: none;">
                                                        </lightning-input-field>
                                                    </template>
                                                </div>
                                            </div>
                                            <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_small">
                                                <template if:true={activeProgramManager}>
                                                    <div
                                                        class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-text-align_right">
                                                        <label class="form-label">Program Manager
                                                        </label>
                                                    </div>
                                                    <div
                                                        class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12">
                                                        <c-hierarchy-custom-lookup-lwc
                                                            s-object-api-name="Hierarchy_Lookup__c"
                                                            onlookupupdate={lookupPMRecord} type-lookup="PM"
                                                            class="lightningFields">
                                                        </c-hierarchy-custom-lookup-lwc>
                                                        <lightning-input-field field-name='Program_Manager__c'
                                                            value={programManagerValue} variant="label-hidden"
                                                            style="display: none;">
                                                        </lightning-input-field>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="slds-grid slds-gutters slds-wrap">
                                        <div
                                            class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_12-of-12">
