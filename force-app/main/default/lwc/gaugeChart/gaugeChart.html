<template>
    <div class="gauge-chart">
        <svg width="100%" height="100%" viewBox="0 0 200 150">
            <!-- Background arc -->
            <path 
                d={backgroundArc}
                fill="none"
                stroke="#e0e0e0"
                stroke-width="10"
                stroke-linecap="round">
            </path>
            
            <!-- Progress arc -->
            <path 
                d={progressArc}
                fill="none"
                stroke={progressColor}
                stroke-width="10"
                stroke-linecap="round">
            </path>
            
            <!-- Center text - Value -->
            <text 
                x="100" 
                y="90" 
                text-anchor="middle" 
                font-size="32" 
                font-weight="bold"
                fill="#333">
                {displayValue}
            </text>
            
            <!-- Center text - Label -->
            <text 
                x="100" 
                y="110" 
                text-anchor="middle" 
                font-size="14"
                fill="#666">
                {label}
            </text>
            
            <!-- Percentage text -->
            <text 
                x="100" 
                y="130" 
                text-anchor="middle" 
                font-size="18"
                font-weight="600"
                fill={progressColor}>
                {displayPercentage}%
            </text>
        </svg>
    </div>
</template>
