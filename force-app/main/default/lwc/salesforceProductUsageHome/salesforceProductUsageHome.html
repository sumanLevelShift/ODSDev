<template>
    <div class="modal-header slds-modal__header slds-p-horizontal_medium nav-bar">
        <div class="alert slds-m-vertical_small" style="display: none;">
            <span class="closebtn" onclick={closeButton}>&times;</span>
            <strong>Warning!</strong> Please select the account to proceed...
        </div>
        

    </div>
    <div class="slds-grid">
        <div class="slds-col slds-size--1-of-2 slds-medium-size--1-of-1 slds-large-size--4-of-12 border-right">
            <c-salesforce-product-feature onprogressvaluechange={hanldeProgressValueChange}
                onaccountvalue={handleAccount} onclientvaluechange={handleClientvalue} onalert={handleAlert}></c-salesforce-product-feature>
        </div>
        <div class="slds-col slds-size--1-of-2 slds-medium-size--1-of-1 slds-large-size--8-of-12">
            <c-salesforce-product-overall-usage-chart oncallaccount={dynamicMethod} client-record={client} account-id={accountId} salesforce-product={features}>
            </c-salesforce-product-overall-usage-chart>
        </div>
    </div>

    <footer class="slds-modal__footer headerclass" style="display:none;">
        <label>© {year} DemandBlue. All rights reserved</label>
    </footer>
</template>
